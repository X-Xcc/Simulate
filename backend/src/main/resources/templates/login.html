<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监狱智能行为分析系统 - 登录</title>
    <link rel="stylesheet" href="/yolov8-security/static/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- 背景装饰 -->
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <!-- 登录卡片 -->
        <div class="login-card" id="loginCard">
            <!-- Logo & 标题 -->
            <div class="login-header">
                <div class="logo-wrap">
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                        <rect x="4" y="4" width="32" height="32" rx="8" stroke="currentColor" stroke-width="2"/>
                        <path d="M14 20l4 4 8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="login-title">监狱智能行为分析系统</h1>
                <p class="login-subtitle">Prison Intelligent Behavior Analysis System</p>
            </div>

            <!-- 表单 -->
            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="error-bar" id="errorBar">
                    <span id="errorMsg"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="username">
                        <svg class="field-icon" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M3 18c0-3.5 3.5-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        用户名 / 工号
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="username" class="input-field" placeholder="请输入用户名或工号" autofocus>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="password">
                        <svg class="field-icon" viewBox="0 0 20 20" fill="none">
                            <rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M6 9V6a4 4 0 118 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        密码
                    </label>
                    <div class="input-wrap">
                        <input type="password" id="password" class="input-field" placeholder="请输入密码">
                        <button type="button" class="toggle-pwd" id="togglePwd" tabindex="-1">
                            <svg class="eye-icon" viewBox="0 0 20 20" fill="none">
                                <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5"/>
                                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="field-row">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="rememberMe" class="checkbox-input">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-label">记住我</span>
                    </label>
                    <span class="attempts" id="attempts"></span>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">登 录</span>
                    <span class="btn-spinner" id="btnSpinner"></span>
                </button>
            </form>

            <!-- 底部 -->
            <div class="login-footer">
                <span class="version">v2.1.0</span>
                <span class="copyright">&copy; 2026 某某科技 版权所有</span>
            </div>
        </div>
    </div>

    <script src="/yolov8-security/static/js/login.js"></script>
</body>
</html>
