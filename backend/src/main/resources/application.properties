server.port=5000
server.servlet.context-path=/yolov8-security

spring.application.name=yolov8-security

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.web.resources.static-locations=classpath:/static/,file:./data/

app.file.upload-dir=${DATA_DIR:./data}
app.file.video-dir=./videos
app.file.model-dir=./models
app.file.result-dir=./results

app.monitor.timeout=300
app.monitor.max-recent-detections=20
app.monitor.max-recent-frames=5

app.python.script.path=./ai-models/yolov8_security.py
app.python.executable=python

# Qwen2.5-VL AI视觉分析
app.qwenVl.service-url=http://127.0.0.1:5001
app.qwenVl.model-path=./models/Qwen2.5-VL-7B-Instruct
app.qwenVl.timeout=30000
app.qwenVl.max-retries=3

# API Key for authentication (empty = skip auth in dev)
app.api-key=

# JWT Secret for login authentication (min 32 chars for HMAC-SHA)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Admin credentials for login
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=http://localhost:5000,http://127.0.0.1:5000
