server.port=5000
server.servlet.context-path=/

spring.application.name=yolov8-security

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

spring.web.resources.static-locations=classpath:/static/,file:/app/data/

app.file.upload-dir=/app/data
app.file.video-dir=/app/videos
app.file.model-dir=/app/models
app.file.result-dir=/app/results

app.monitor.timeout=300
app.monitor.max-recent-detections=20
app.monitor.max-recent-frames=5

app.python.script.path=/app/code/yolov8_security.py
app.python.executable=/opt/venv/bin/python

app.qwenVl.service-url=http://127.0.0.1:5001
app.qwenVl.model-path=/app/models/Qwen2.5-VL-7B-Instruct
app.qwenVl.timeout=30000
app.qwenVl.max-retries=3

# API Key for authentication (set via APP_API_KEY env var in production)
app.api-key=${APP_API_KEY:change-me-in-production}
