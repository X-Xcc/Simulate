# === Production Profile ===
# Activate: --spring.profiles.active=prod

# API key required (set via env var)
app.api-key=${API_KEY}

# H2 console disabled
spring.h2.console.enabled=false

# Cleanup old data
app.cleanup.retention-days=3

# Demo mode disabled
app.demo-mode=false
app.demo.enabled=false
app.fake-alert.enabled=false

# Thymeleaf caching
spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600
