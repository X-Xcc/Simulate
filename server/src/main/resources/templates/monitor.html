<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>监控中心 - 监狱智能行为分析系统</title>
<link rel="stylesheet" href="/yolov8-security/static/css/common.css">
<link rel="stylesheet" href="/yolov8-security/static/css/monitor.css">
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div>
        <h1 class="topbar-title">监狱智能行为分析系统</h1>
        <div class="topbar-subtitle">Prison Behavior Analysis</div>
      </div>
    </div>

    <nav class="topbar-nav">
      <a href="/yolov8-security/" class="active">监控大屏</a>
    </nav>

    <div class="topbar-stats">
      <div class="stat-chip">
        <div class="stat-chip-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg></div>
        <div>
          <div class="stat-chip-value" id="totalDetections">--</div>
          <div class="stat-chip-label">检测总量</div>
        </div>
      </div>
      <div class="stat-chip alert">
        <div class="stat-chip-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div>
          <div class="stat-chip-value" id="totalAlerts">--</div>
          <div class="stat-chip-label">活跃告警</div>
        </div>
      </div>
      <div class="stat-chip online">
        <div class="stat-chip-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div>
          <div class="stat-chip-value" id="onlineDevices">--</div>
          <div class="stat-chip-label">在线设备</div>
        </div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></div>
        <div>
          <div class="stat-chip-value" id="avgFps">--</div>
          <div class="stat-chip-label">FPS</div>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="topbar-clock" id="clock">--:--:--</div>
      <button class="topbar-btn" title="全屏" id="fullscreenBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="topbar-btn" title="后台管理" id="adminBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content">

    <!-- CAMERA GRID -->
    <div class="grid-area" id="cameraGrid">
      <!-- Generated by monitor.js -->
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar-r">
      <!-- Alerts -->
      <div class="sidebar-section">
        <div class="sidebar-header">
          <h2 class="sidebar-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            实时告警
          </h2>
          <span class="sidebar-count" id="alertCount">0</span>
        </div>
        <div class="sidebar-list" id="alertList">
          <!-- Generated by monitor.js -->
        </div>
      </div>

      <!-- Devices -->
      <div class="sidebar-section">
        <div class="sidebar-header">
          <h2 class="sidebar-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            设备状态
          </h2>
          <span class="sidebar-count" id="deviceCount">0</span>
        </div>
        <div class="sidebar-list" id="deviceList">
          <!-- Generated by monitor.js -->
        </div>
      </div>
    </aside>

  </div>
</div>

<script src="/yolov8-security/static/js/monitor.js"></script>
</body>
</html>
