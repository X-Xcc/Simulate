server.port=5000
server.servlet.context-path=/

spring.application.name=yolov8-security

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.web.resources.static-locations=classpath:/static/,file:web/dist/,file:./data/
spring.web.resources.cache.period=0

app.file.upload-dir=${DATA_DIR:./data}
app.file.video-dir=./videos
app.file.model-dir=./models
app.file.result-dir=./results

app.monitor.timeout=300
app.monitor.max-recent-detections=20
app.monitor.max-recent-frames=5

app.python.scriptPath=detection/yolov8_security.py
app.python.executable=python

# Qwen2.5-VL AI视觉分析
app.qwenVl.service-url=http://127.0.0.1:5001
app.qwenVl.model-path=./models/Qwen2.5-VL-7B-Instruct
app.qwenVl.timeout=30000
app.qwenVl.max-retries=3

# API Key for authentication (empty = skip auth in dev)
app.api-key=

# JWT Secret for login authentication (min 32 chars for HMAC-SHA)
app.jwt.secret=${JWT_SECRET:change-this-to-a-random-string-at-least-32-chars}
app.jwt.expiration=86400000

# Admin credentials for login
app.admin.username=${ADMIN_USERNAME:xx}
app.admin.password=${ADMIN_PASSWORD:123}

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=http://localhost:5000,http://127.0.0.1:5000,http://localhost:5173

# Multipart file upload limits
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Video streaming config
app.video.stream-poll-interval-ms=16
app.video.no-frame-poll-interval-ms=200
app.video.frame-ttl-ms=30000

# Auto-cleanup: delete detection/frame files older than N days
app.cleanup.retention-days=3

# Demo mode: virtual data for frontend development without GPU/cameras
app.demo-mode=false
app.demo.enabled=false
app.demo.detection-interval-ms=6000
app.demo.camera-count=16

# Daily simulated alerts (demo/presentation only — MUST be false in production)
app.fake-alert.enabled=true
app.fake-alert.min-count=10
app.fake-alert.max-count=15

# H2 Database
spring.datasource.url=jdbc:h2:file:${DATA_DIR:./data}/db/cameras;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.sql.init.mode=embedded
