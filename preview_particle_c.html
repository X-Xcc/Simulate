<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子流场</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a14; }
    canvas { display: block; }
    .info { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(80,200,255,0.7); font-family: monospace; font-size: 12px; letter-spacing: 0.15em; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="info">FLOW FIELD — 粒子沿流场运动，鼠标扰动</div>
  <canvas id="canvas"></canvas>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
  <script type="module">
    import * as THREE from 'three';
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const COUNT = 8000;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(COUNT * 2);
    const vel = new Float32Array(COUNT * 2);
    const life = new Float32Array(COUNT);
    const col = new Float32Array(COUNT * 3);

    for (let i = 0; i < COUNT; i++) {
      pos[i*2] = Math.random() * 2 - 1;
      pos[i*2+1] = Math.random() * 2 - 1;
      life[i] = Math.random();
      const t = Math.random();
      col[i*3] = 0.1 + t * 0.2;
      col[i*3+1] = 0.3 + t * 0.5;
      col[i*3+2] = 0.5 + t * 0.5;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 2));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uMouse: { value: new THREE.Vector2(0.5, 0.5) } },
      vertexShader: `attribute vec3 color; varying vec3 vColor; void main() { vColor = color; gl_Position = vec4(position, 1.0); }`,
      fragmentShader: `varying vec3 vColor; void main() { gl_FragColor = vec4(vColor, 0.6); }`,
      transparent: true, depthWrite: false
    });
    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // 流场线条
    const FLOW_COUNT = 500;
    const flowGeo = new THREE.BufferGeometry();
    const flowPos = new Float32Array(FLOW_COUNT * 6);
    flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPos, 2));
    const flowMat = new THREE.LineBasicMaterial({ color: 0x224466, transparent: true, opacity: 0.15 });
    const flowLines = new THREE.LineSegments(flowGeo, flowMat);
    scene.add(flowLines);

    const mouse = new THREE.Vector2();

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = 1 - e.clientY / window.innerHeight;
    });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      mat.uniforms.uTime.value = t;
      mat.uniforms.uMouse.value.set(mouse.x, mouse.y);

      const p = geo.attributes.position.array;
      const c = geo.attributes.color.array;

      for (let i = 0; i < COUNT; i++) {
        const x = p[i*2], y = p[i*2+1];

        // 流场函数
        const angle = Math.sin(x * 3 + t * 0.5) * Math.PI + Math.cos(y * 3 + t * 0.3) * Math.PI;

        // 鼠标扰动
        const dx = x - mouse.x, dy = y - mouse.y;
        const mouseDist = Math.sqrt(dx*dx + dy*dy);
        const mouseAngle = mouseDist < 0.3 ? Math.atan2(dy, dx) + Math.PI : 0;
        const mouseStrength = Math.max(0, 1 - mouseDist / 0.3) * 2;

        const finalAngle = angle + mouseAngle * mouseStrength * 0.5;

        p[i*2] += Math.cos(finalAngle) * 0.003;
        p[i*2+1] += Math.sin(finalAngle) * 0.003;

        // 边界重置
        if (p[i*2] > 1) p[i*2] = -1;
        if (p[i*2] < -1) p[i*2] = 1;
        if (p[i*2+1] > 1) p[i*2+1] = -1;
        if (p[i*2+1] < -1) p[i*2+1] = 1;

        // 鼠标附近发光
        if (mouseDist < 0.3) {
          const intensity = (1 - mouseDist / 0.3);
          c[i*3] = Math.min(1, c[i*3] + intensity * 0.3);
          c[i*3+1] = Math.min(1, c[i*3+1] + intensity * 0.4);
          c[i*3+2] = Math.min(1, c[i*3+2] + intensity * 0.3);
        }
      }
      geo.attributes.position.needsUpdate = true;
      geo.attributes.color.needsUpdate = true;

      // 流场箭头
      const fp = flowGeo.attributes.position.array;
      for (let i = 0; i < FLOW_COUNT; i++) {
        const x = (Math.random() - 0.5) * 2;
        const y = (Math.random() - 0.5) * 2;
        const angle = Math.sin(x * 3 + t * 0.5) * Math.PI + Math.cos(y * 3 + t * 0.3) * Math.PI;
        fp[i*6] = x; fp[i*6+1] = y;
        fp[i*6+2] = x + Math.cos(angle) * 0.05;
        fp[i*6+3] = y + Math.sin(angle) * 0.05;
      }
      flowGeo.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
