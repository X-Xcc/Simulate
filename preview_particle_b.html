<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神经网络粒子</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050510; }
    canvas { display: block; }
    .info { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(100,150,255,0.7); font-family: monospace; font-size: 12px; letter-spacing: 0.15em; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="info">NEURAL NETWORK PARTICLES — 鼠标生成连接路径</div>
  <canvas id="canvas"></canvas>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
  <script type="module">
    import * as THREE from 'three';
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 60;

    // 节点粒子
    const NODE_COUNT = 80;
    const nodeGeo = new THREE.BufferGeometry();
    const nodePos = new Float32Array(NODE_COUNT * 3);
    const nodeColors = new Float32Array(NODE_COUNT * 3);
    for (let i = 0; i < NODE_COUNT; i++) {
      const i3 = i * 3;
      nodePos[i3] = (Math.random() - 0.5) * 80;
      nodePos[i3 + 1] = (Math.random() - 0.5) * 60;
      nodePos[i3 + 2] = (Math.random() - 0.5) * 30;
      const t = Math.random();
      nodeColors[i3] = 0.1 + t * 0.3;
      nodeColors[i3 + 1] = 0.2 + t * 0.4;
      nodeColors[i3 + 2] = 0.5 + t * 0.5;
    }
    nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePos, 3));
    nodeGeo.setAttribute('color', new THREE.BufferAttribute(nodeColors, 3));
    const nodeMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uMouse: { value: new THREE.Vector2(0, 0) } },
      vertexShader: `attribute vec3 color; varying vec3 vColor; void main() { vColor = color; vec4 mv = modelViewMatrix * vec4(position, 1.0); gl_PointSize = 6.0 * (150.0 / -mv.z); gl_Position = projectionMatrix * mv; }`,
      fragmentShader: `varying vec3 vColor; void main() { float d = length(gl_PointCoord - 0.5); if(d > 0.5) discard; gl_FragColor = vec4(vColor, smoothstep(0.5, 0.1, d)); }`,
      transparent: true
    });
    const nodes = new THREE.Points(nodeGeo, nodeMat);
    scene.add(nodes);

    // 连接线
    const MAX_LINES = 500;
    const lineGeo = new THREE.BufferGeometry();
    const linePos = new Float32Array(MAX_LINES * 2 * 3);
    const lineAlpha = new Float32Array(MAX_LINES * 2);
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
    const lineMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.4 });
    const lines3d = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines3d);

    // 鼠标生成的新连接
    const trailPoints = [];
    const MAX_TRAIL = 50;
    const trailGeo = new THREE.BufferGeometry();
    const trailPos = new Float32Array(MAX_TRAIL * 3);
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
    const trailMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.8 });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);

    const mouse = new THREE.Vector2();
    const mouseWorld = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      raycaster.ray.intersectPlane(plane, mouseWorld);
      trailPoints.unshift(mouseWorld.clone());
      if (trailPoints.length > MAX_TRAIL) trailPoints.pop();
    });

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;
      nodeMat.uniforms.uTime.value = t;
      nodeMat.uniforms.uMouse.value.set(mouse.x, mouse.y);

      // 节点缓慢移动
      const pos = nodeGeo.attributes.position.array;
      for (let i = 0; i < NODE_COUNT; i++) {
        const i3 = i * 3;
        pos[i3] += Math.sin(t + i) * 0.05;
        pos[i3 + 1] += Math.cos(t * 0.7 + i) * 0.03;
      }
      nodeGeo.attributes.position.needsUpdate = true;

      // 更新连接线
      const lp = lineGeo.attributes.position.array;
      let li = 0;
      for (let i = 0; i < NODE_COUNT && li < MAX_LINES; i++) {
        for (let j = i + 1; j < NODE_COUNT && li < MAX_LINES; j++) {
          const j3 = j * 3;
          const dx = pos[i3] - pos[j3], dy = pos[i3+1] - pos[j3+1], dz = pos[i3+2] - pos[j3+2];
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
          if (dist < 20) {
            lp[li*6] = pos[i3]; lp[li*6+1] = pos[i3+1]; lp[li*6+2] = pos[i3+2];
            lp[li*6+3] = pos[j3]; lp[li*6+4] = pos[j3+1]; lp[li*6+5] = pos[j3+2];
            li++;
          }
        }
      }
      lineGeo.setDrawRange(0, li * 2);
      lineGeo.attributes.position.needsUpdate = true;

      // 更新鼠标轨迹
      const tp = trailGeo.attributes.position.array;
      for (let i = 0; i < MAX_TRAIL; i++) {
        if (i < trailPoints.length) {
          tp[i*3] = trailPoints[i].x;
          tp[i*3+1] = trailPoints[i].y;
          tp[i*3+2] = trailPoints[i].z;
        }
      }
      trailGeo.setDrawRange(0, trailPoints.length);
      trailGeo.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
